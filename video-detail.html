  WhatsApp

<script src="main.js"></script>
<script>
const GRADIENTS={wedding:'linear-gradient(135deg,#C17A3C,#8B5E3C)',prewedding:'linear-gradient(135deg,#D4A574,#B8926A)',corporate:'linear-gradient(135deg,#5C4B3A,#3D3025)',event:'linear-gradient(135deg,#8B6B4A,#6B4E35)',documentary:'linear-gradient(135deg,#7B5E42,#5A4330)',socialmedia:'linear-gradient(135deg,#E8CFA0,#C8A870)'};
const CAT_LABELS={wedding:'Wedding',prewedding:'Prewedding',corporate:'Corporate',event:'Event',documentary:'Documentary',socialmedia:'Social Media'};
const CAT_PAGES={wedding:'video-wedding.html',prewedding:'video-prewedding.html',corporate:'video-corporate.html',event:'video-event.html',documentary:'video-documentary.html',socialmedia:'video-socialmedia.html'};

const params = new URLSearchParams(location.search);
const videoId = params.get('id');

fetch('data.json').then(r=>r.json()).then(data=>{
  const video = data.videos.find(v=>v.id===videoId);
  if(!video){
    document.getElementById('videoContent').innerHTML='<div class="empty-state"><div class="empty-state-title">Video tidak ditemukan</div><p class="empty-state-sub"><a href="work.html" style="color:var(--accent);">Kembali ke Karya</a></p></div>';
    return;
  }
  document.title = video.title + ' — Axel Ariel';
  document.getElementById('bcCat').textContent = CAT_LABELS[video.category]||'Video';
  document.getElementById('bcTitle').textContent = video.title;

  // Prev/next in same category
  const samecat = data.videos.filter(v=>v.category===video.category);
  const idx = samecat.findIndex(v=>v.id===video.id);
  const prev = samecat[idx-1];
  const next = samecat[idx+1];

  const tools = (video.tools||[]).map(t=>`<span class="meta-pill">${t}</span>`).join('');

  document.getElementById('videoContent').innerHTML = `
    <h1 class="video-detail-title">${video.title}</h1>
    <div class="video-detail-meta">
      ${video.featured?'<span class="meta-pill featured">Featured</span>':''}
      <span class="meta-pill">${CAT_LABELS[video.category]||video.category}</span>
      <span class="meta-pill">${video.year}</span>
      <span class="meta-pill">${video.location}</span>
      <span class="meta-pill">${video.duration}</span>
    </div>

    <div class="video-embed-wrap" id="embedWrap">
      <div class="video-embed-placeholder" id="embedPlaceholder" style="background:${GRADIENTS[video.category]||'linear-gradient(135deg,#C17A3C,#8B5E3C)'};" onclick="loadVideo()">
        <div class="video-embed-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="video-2col">
      <div>
        <h3 style="font-family:var(--font-display);font-size:1.1rem;color:var(--text);margin-bottom:0.75rem;">Tentang Video</h3>
        <p class="video-desc">${video.description}</p>
      </div>
      <div>
        <div class="video-info-box">
          <div class="video-info-item"><div class="video-info-label">Kategori</div><div class="video-info-value">${CAT_LABELS[video.category]||video.category}</div></div>
          <div class="video-info-item"><div class="video-info-label">Tahun</div><div class="video-info-value">${video.year}</div></div>
          <div class="video-info-item"><div class="video-info-label">Lokasi</div><div class="video-info-value">${video.location}</div></div>
          <div class="video-info-item"><div class="video-info-label">Durasi</div><div class="video-info-value">${video.duration}</div></div>
          <div class="video-info-item">
            <div class="video-info-label">Tools</div>
            <div class="video-info-value" style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.25rem;">${tools}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="video-cta-box">
      <h3>Suka hasilnya? Chat di <em>WhatsApp</em></h3>
      <a href="https://wa.me/6285542200957?text=Halo%20Axel%2C%20saya%20tertarik%20dengan%20video%20${encodeURIComponent(video.title)}" target="_blank" class="btn btn-amber">Hubungi via WhatsApp</a>
    </div>

    <div class="video-nav-row">
      ${prev?`<a href="video-detail.html?id=${prev.id}" class="video-nav-btn"><span class="video-nav-label">&#8592; Sebelumnya</span><span class="video-nav-title">${prev.title}</span></a>`:'<div></div>'}
      ${next?`<a href="video-detail.html?id=${next.id}" class="video-nav-btn" style="text-align:right;"><span class="video-nav-label">Berikutnya &#8594;</span><span class="video-nav-title">${next.title}</span></a>`:'<div></div>'}
    </div>
  `;

  window.loadVideo = function(){
    if(!video.youtube_id||video.youtube_id==='YOUTUBE_ID_DI_SINI'){
      alert('YouTube ID belum dikonfigurasi untuk video ini.');
      return;
    }
    var wrap = document.getElementById('embedWrap');
    wrap.innerHTML = '<iframe src="https://www.youtube.com/embed/'+video.youtube_id+'?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>';
  };
}).catch(()=>{
  document.getElementById('videoContent').innerHTML='<p class="loading-text">Gagal memuat data.</p>';
});
</script>
</body>
