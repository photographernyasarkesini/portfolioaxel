<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan — Admin Axel Ariel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Inter:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F4EFE6;--bg-alt:#EDE5D8;--bg-dark:#0D0805;--surface:#FDFAF6;
      --text:#1C1612;--text-muted:#8C7B6B;--accent:#C17A3C;
      --sidebar:#1C1612;--sidebar-w:240px;
      --font-display:'DM Serif Display',serif;
      --font-body:'Inter',sans-serif;
      --font-mono:'Space Mono',monospace;
    }
    html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);}
    body{display:flex;}

    /* SIDEBAR */
    .admin-sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto;}
    .sidebar-header{padding:1.75rem 1.5rem 1.25rem;}
    .sidebar-logo{font-family:var(--font-display);font-size:1.3rem;color:#FDFAF6;text-decoration:none;display:block;}
    .sidebar-sublabel{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(253,250,246,0.35);margin-top:0.25rem;}
    .sidebar-badge{display:inline-flex;align-items:center;gap:5px;margin-top:0.75rem;padding:3px 8px;border-radius:20px;background:rgba(74,222,128,0.12);font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#4ade80;}
    .sidebar-badge-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;}
    .sidebar-divider{height:1px;background:rgba(255,255,255,0.07);margin:0.75rem 0;}
    .sidebar-nav{flex:1;padding:0.5rem 0;}
    .sidebar-nav-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(253,250,246,0.25);padding:0.5rem 1.5rem 0.35rem;}
    .sidebar-link{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;text-decoration:none;font-size:13px;color:rgba(253,250,246,0.55);transition:all 0.15s;}
    .sidebar-link:hover{color:#FDFAF6;background:rgba(255,255,255,0.05);}
    .sidebar-link.active{color:#FDFAF6;background:rgba(193,122,60,0.15);border-right:2px solid var(--accent);}
    .sidebar-link svg{flex-shrink:0;opacity:0.6;}
    .sidebar-link.active svg{opacity:1;}
    .sidebar-footer{padding:1.25rem 1.5rem;border-top:1px solid rgba(255,255,255,0.07);}
    .sidebar-site-link{display:block;font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(253,250,246,0.3);text-decoration:none;margin-bottom:0.75rem;transition:color 0.15s;}
    .sidebar-site-link:hover{color:var(--accent);}
    .btn-logout{width:100%;padding:0.5rem 0.75rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:5px;cursor:pointer;font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(253,250,246,0.4);transition:all 0.15s;}
    .btn-logout:hover{background:rgba(193,122,60,0.15);color:var(--accent);border-color:rgba(193,122,60,0.3);}

    /* MAIN */
    .admin-main{margin-left:var(--sidebar-w);flex:1;padding:2.5rem;min-height:100vh;}
    .admin-page-header{margin-bottom:2rem;}
    .admin-page-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;}
    .admin-page-title{font-family:var(--font-display);font-size:2rem;color:var(--text);}

    .settings-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;max-width:700px;}
    .admin-card{background:var(--surface);border:1px solid rgba(28,22,18,0.08);border-radius:10px;padding:1.5rem;}
    .admin-card-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid rgba(28,22,18,0.07);}
    .card-title-icon{display:flex;align-items:center;gap:0.5rem;}
    .card-title-icon svg{color:var(--accent);}

    .form-group{margin-bottom:1rem;}
    .form-group:last-of-type{margin-bottom:0;}
    .form-label{display:block;font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;}
    .form-input,.form-textarea{width:100%;padding:0.65rem 0.875rem;border:1px solid rgba(28,22,18,0.15);border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;}
    .form-input:focus,.form-textarea:focus{border-color:var(--accent);}
    .form-textarea{min-height:80px;resize:vertical;}
    .pw-wrap{position:relative;}
    .pw-wrap .form-input{padding-right:3rem;}
    .pw-toggle{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;padding:0;transition:color 0.2s;}
    .pw-toggle:hover{color:var(--accent);}

    .card-save-row{display:flex;align-items:center;gap:1rem;margin-top:1.25rem;}
    .btn-save{padding:0.6rem 1.5rem;background:var(--bg-dark);color:#FDFAF6;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.2s;}
    .btn-save:hover{background:var(--accent);color:#1A0F08;}
    .save-msg{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#4ade80;opacity:0;transition:opacity 0.3s;}
    .save-msg.show{opacity:1;}

    @media(max-width:768px){.admin-main{margin-left:0;padding:1.5rem;}}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="admin-sidebar">
  <div class="sidebar-header">
    <a href="../index.html" class="sidebar-logo">Axel Ariel</a>
    <div class="sidebar-sublabel">Admin Panel</div>
    <div class="sidebar-badge"><span class="sidebar-badge-dot"></span> Online</div>
  </div>
  <div class="sidebar-divider"></div>
  <nav class="sidebar-nav">
    <div class="sidebar-nav-label">Menu</div>
    <a href="dashboard.html" class="sidebar-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="videos.html" class="sidebar-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0121 8.88v6.24a1 1 0 01-1.447.888L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
      Kelola Video
    </a>
    <a href="albums.html" class="sidebar-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Kelola Album
    </a>
    <a href="settings.html" class="sidebar-link active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Pengaturan
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="../index.html" class="sidebar-site-link" target="_blank">&#8599; Lihat Website</a>
    <button class="btn-logout" onclick="logout()">Keluar</button>
  </div>
</aside>

<!-- MAIN -->
<main class="admin-main">
  <div class="admin-page-header">
    <p class="admin-page-label">Admin Panel</p>
    <h1 class="admin-page-title">Pengaturan</h1>
  </div>

  <div class="settings-grid">

    <!-- SECTION 1: Info Website -->
    <div class="admin-card">
      <div class="admin-card-title">
        <div class="card-title-icon">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Info Website
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="sNama">Nama Website</label>
        <input class="form-input" type="text" id="sNama" placeholder="Axel Ariel">
      </div>
      <div class="form-group">
        <label class="form-label" for="sTagline">Tagline</label>
        <input class="form-input" type="text" id="sTagline" placeholder="Freelance Fotografer &amp; Videografer">
      </div>
      <div class="form-group">
        <label class="form-label" for="sBio">Bio Singkat</label>
        <textarea class="form-textarea" id="sBio" placeholder="Videografer dan fotografer berbasis di Batam."></textarea>
      </div>
      <div class="card-save-row">
        <button class="btn-save" onclick="saveSection('website')">Simpan</button>
        <span class="save-msg" id="msg-website">Tersimpan!</span>
      </div>
    </div>

    <!-- SECTION 2: Info Kontak -->
    <div class="admin-card">
      <div class="admin-card-title">
        <div class="card-title-icon">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/></svg>
          Info Kontak
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="cWa">Nomor WhatsApp</label>
        <input class="form-input" type="text" id="cWa" placeholder="+62 855-4220-0957">
      </div>
      <div class="form-group">
        <label class="form-label" for="cEmail">Email</label>
        <input class="form-input" type="email" id="cEmail" placeholder="axelarielmuhammad@gmail.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="cIg">Instagram</label>
        <input class="form-input" type="text" id="cIg" placeholder="@shotbyaxell">
      </div>
      <div class="form-group">
        <label class="form-label" for="cLokasi">Lokasi</label>
        <input class="form-input" type="text" id="cLokasi" placeholder="Batam, Kepulauan Riau, Indonesia">
      </div>
      <div class="form-group">
        <label class="form-label" for="cJam">Jam Kerja</label>
        <input class="form-input" type="text" id="cJam" placeholder="Senin–Sabtu, 09.00–21.00 WIB">
      </div>
      <div class="card-save-row">
        <button class="btn-save" onclick="saveSection('kontak')">Simpan</button>
        <span class="save-msg" id="msg-kontak">Tersimpan!</span>
      </div>
    </div>

    <!-- SECTION 3: Ganti Password -->
    <div class="admin-card">
      <div class="admin-card-title">
        <div class="card-title-icon">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Ganti Password
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="pwLama">Password Lama</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="pwLama" placeholder="Password saat ini">
          <button type="button" class="pw-toggle" onclick="togglePwField('pwLama','eyeLama')">
            <svg id="eyeLama" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="pwBaru">Password Baru</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="pwBaru" placeholder="Password baru">
          <button type="button" class="pw-toggle" onclick="togglePwField('pwBaru','eyeBaru')">
            <svg id="eyeBaru" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="pwKonfirmasi">Konfirmasi Password Baru</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="pwKonfirmasi" placeholder="Ulangi password baru">
          <button type="button" class="pw-toggle" onclick="togglePwField('pwKonfirmasi','eyeKonfirmasi')">
            <svg id="eyeKonfirmasi" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="card-save-row">
        <button class="btn-save" onclick="saveSection('password')">Ganti Password</button>
        <span class="save-msg" id="msg-password">Tersimpan!</span>
      </div>
    </div>

  </div>
</main>

<script>
if(sessionStorage.getItem('admin_auth')!=='1'){window.location.href='index.html';}
function logout(){sessionStorage.removeItem('admin_auth');window.location.href='index.html';}

// Load saved settings from localStorage
(function(){
  var s=JSON.parse(localStorage.getItem('axel_settings')||'{}');
  if(s.nama)document.getElementById('sNama').value=s.nama;
  if(s.tagline)document.getElementById('sTagline').value=s.tagline;
  if(s.bio)document.getElementById('sBio').value=s.bio;
  if(s.wa)document.getElementById('cWa').value=s.wa;
  if(s.email)document.getElementById('cEmail').value=s.email;
  if(s.instagram)document.getElementById('cIg').value=s.instagram;
  if(s.lokasi)document.getElementById('cLokasi').value=s.lokasi;
  if(s.jam)document.getElementById('cJam').value=s.jam;
})();

function showMsg(id){
  var el=document.getElementById('msg-'+id);
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

function saveSection(section){
  var s=JSON.parse(localStorage.getItem('axel_settings')||'{}');
  if(section==='website'){
    s.nama=document.getElementById('sNama').value;
    s.tagline=document.getElementById('sTagline').value;
    s.bio=document.getElementById('sBio').value;
    localStorage.setItem('axel_settings',JSON.stringify(s));
    showMsg('website');
  } else if(section==='kontak'){
    s.wa=document.getElementById('cWa').value;
    s.email=document.getElementById('cEmail').value;
    s.instagram=document.getElementById('cIg').value;
    s.lokasi=document.getElementById('cLokasi').value;
    s.jam=document.getElementById('cJam').value;
    localStorage.setItem('axel_settings',JSON.stringify(s));
    showMsg('kontak');
  } else if(section==='password'){
    var lama=document.getElementById('pwLama').value;
    var baru=document.getElementById('pwBaru').value;
    var konfirmasi=document.getElementById('pwKonfirmasi').value;
    var saved=JSON.parse(localStorage.getItem('axel_settings')||'{}');
    var current=saved.password||'axelariel2025';
    if(lama!==current){alert('Password lama salah.');return;}
    if(!baru){alert('Password baru tidak boleh kosong.');return;}
    if(baru!==konfirmasi){alert('Konfirmasi password tidak cocok.');return;}
    saved.password=baru;
    localStorage.setItem('axel_settings',JSON.stringify(saved));
    document.getElementById('pwLama').value='';
    document.getElementById('pwBaru').value='';
    document.getElementById('pwKonfirmasi').value='';
    showMsg('password');
  }
}

function togglePwField(inputId,iconId){
  var inp=document.getElementById(inputId);
  var icon=document.getElementById(iconId);
  if(inp.type==='password'){
    inp.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
</body>
</html>
