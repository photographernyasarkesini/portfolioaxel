<script src="main.js"></script>
<script>
const KATEGORI='graduation';
const CG={wedding:'linear-gradient(135deg,#C17A3C,#8B5E3C)',prewedding:'linear-gradient(135deg,#D4A574,#B8926A)',portrait:'linear-gradient(135deg,#D4A574,#A8825A)',graduation:'linear-gradient(135deg,#C17A3C,#956030)',event:'linear-gradient(135deg,#8B6B4A,#6B4E35)',product:'linear-gradient(135deg,#5C4B3A,#3D3025)',analog:'linear-gradient(135deg,#5C4535,#1E1510)'};
fetch('data.json').then(r=>r.json()).then(data=>{
  const albums=data.albums.filter(a=>a.category===KATEGORI);
  document.getElementById('albumCount').textContent=albums.length+' album ditemukan';
  const grid=document.getElementById('albumGrid');
  if(!albums.length){grid.innerHTML='<div class="empty-state"><div class="empty-state-icon">📷</div><h3 class="empty-state-title">Belum ada album</h3></div>';return;}
  grid.innerHTML=albums.map(a=>`<a href="foto-detail.html?id=${a.id}" class="album-card"><div class="album-card-thumb"><div style="position:absolute;inset:0;background:${a.cover?`url(${a.cover}) center/cover`:CG[a.category]||CG.wedding};"></div><div class="album-card-hover"><span class="album-card-hover-pill">Lihat Album &rarr;</span></div></div><div class="album-card-info"><div class="album-card-title">${a.title}</div><div class="album-card-meta">${a.year} &middot; ${a.location}</div></div></a>`).join('');
});
</script>
